<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Continue</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: #fff;
    }

    body.android {
      font-family: Roboto, "Segoe UI", sans-serif;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(0, 0, 0, 0.35);
    }

    .alert {
      width: min(100%, 360px);
      padding: 18px 20px 14px;
      border-radius: 14px;
      background: rgba(242, 242, 247, 0.88);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.12),
        0 0 0 0.5px rgba(0, 0, 0, 0.06);
    }

    @supports not (backdrop-filter: blur(20px)) {
      .alert {
        background: #ebebef;
      }
    }

    .alert-text {
      font-size: 17px;
      font-weight: 400;
      line-height: 22px;
      letter-spacing: -0.43px;
      color: #000;
      text-align: left;
      padding-right: 8px;
    }

    .alert-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 20px;
      margin-top: 18px;
    }

    .alert-btn {
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.43px;
      color: #007aff;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
      padding: 2px 0;
    }

    .alert-btn:active {
      opacity: 0.55;
    }

    .alert-btn-cancel {
      font-weight: 400;
    }

    .alert-btn-open {
      font-weight: 600;
    }

    body.android .alert-btn {
      color: #1a73e8;
      font-size: 14px;
      letter-spacing: 0.1px;
    }

    body.android .alert-text {
      font-size: 16px;
      line-height: 24px;
      letter-spacing: 0.15px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="backdrop" class="backdrop">
    <div id="alert" class="alert hidden" role="alertdialog" aria-modal="true">
      <p id="alert-text" class="alert-text">Open this page in &ldquo;Safari&rdquo;?</p>
      <div class="alert-actions">
        <a id="btn-cancel" class="alert-btn alert-btn-cancel" href="#">Cancel</a>
        <a id="btn-open" class="alert-btn alert-btn-open" href="#">Open</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var DEFAULT_URL = "https://example.com";

      function encodeTarget(url) {
        return btoa(unescape(encodeURIComponent(url)))
          .replace(/\+/g, "-")
          .replace(/\//g, "_")
          .replace(/=+$/, "");
      }

      function decodeTarget(value) {
        var base64 = value.replace(/-/g, "+").replace(/_/g, "/");

        while (base64.length % 4) {
          base64 += "=";
        }

        return decodeURIComponent(escape(atob(base64)));
      }

      function normalizeTarget(url) {
        try {
          return new URL(url, window.location.href).href;
        } catch (error) {
          return DEFAULT_URL;
        }
      }

      function resolveTargetUrl() {
        var hash = window.location.hash.replace(/^#/, "");
        var params = new URLSearchParams(window.location.search);
        var raw = "";
        var shouldCleanUrl = false;

        if (hash) {
          try {
            raw = decodeTarget(hash);
          } catch (error) {
            raw = decodeURIComponent(hash);
          }
        } else if (params.get("d")) {
          try {
            raw = decodeTarget(params.get("d"));
            shouldCleanUrl = true;
          } catch (error) {
            raw = DEFAULT_URL;
          }
        } else if (params.get("to") || params.get("url")) {
          raw = params.get("to") || params.get("url");
          shouldCleanUrl = true;
        } else {
          raw = DEFAULT_URL;
        }

        var targetUrl = normalizeTarget(raw);

        if (shouldCleanUrl) {
          history.replaceState(null, "", location.pathname + "#" + encodeTarget(targetUrl));
        }

        return targetUrl;
      }

      var targetUrl = resolveTargetUrl();

      var ua = navigator.userAgent || "";
      var uaLower = ua.toLowerCase();

      var IN_APP_PATTERNS = [
        "tiktok",
        "bytedancewebview",
        "musical_ly",
        "instagram",
        "fban",
        "fbav",
        "fbios",
        "fb_iab",
        "fb4a",
        "twitter",
        "linkedinapp",
        "snapchat",
        "pinterest",
        "reddit",
        "whatsapp",
        "line/",
        "micromessenger",
        "threads",
        "kakaotalk",
        "naver",
        "electron"
      ];

      function isIOS() {
        return /iphone|ipad|ipod/i.test(ua);
      }

      function isAndroid() {
        return /android/i.test(ua);
      }

      function getIOSVersion() {
        var match = ua.match(/OS (\d+)[_.](\d+)/i);
        return match ? parseInt(match[1], 10) : 0;
      }

      function isInAppBrowser() {
        if (IN_APP_PATTERNS.some(function (pattern) {
          return uaLower.indexOf(pattern) !== -1;
        })) {
          return true;
        }

        if (isIOS() && uaLower.indexOf("safari") === -1 && uaLower.indexOf("crios") === -1) {
          return true;
        }

        if (isAndroid() && (/\bwv\b/.test(uaLower) || uaLower.indexOf("version/") !== -1)) {
          return true;
        }

        return false;
      }

      function buildIOSRedirectUrl(url) {
        var iosVersion = getIOSVersion();

        if (iosVersion >= 17) {
          return "x-safari-" + url;
        }

        if (iosVersion >= 15) {
          return "com-apple-mobilesafari-tab:" + url;
        }

        return (
          "shortcuts://x-callback-url/run-shortcut?name=" +
          encodeURIComponent("Open URL") +
          "&x-error=" +
          encodeURIComponent(url)
        );
      }

      function buildAndroidRedirectUrl(url, useChrome) {
        var stripped = url.replace(/^https?:\/\//, "");
        var intent =
          "intent://" +
          stripped +
          "#Intent;scheme=https;action=android.intent.action.VIEW;";

        if (useChrome) {
          intent += "package=com.android.chrome;";
        }

        intent += "S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
        return intent;
      }

      function bindRedirectLinks(redirectUrl) {
        var btnCancel = document.getElementById("btn-cancel");
        var btnOpen = document.getElementById("btn-open");

        btnCancel.href = redirectUrl;
        btnOpen.href = redirectUrl;

        if (isAndroid()) {
          var opened = false;

          function tryFallback() {
            setTimeout(function () {
              if (!opened && document.visibilityState === "visible") {
                var fallbackUrl = buildAndroidRedirectUrl(targetUrl, false);
                btnCancel.href = fallbackUrl;
                btnOpen.href = fallbackUrl;
              }
            }, 1200);
          }

          btnCancel.addEventListener("click", tryFallback);
          btnOpen.addEventListener("click", tryFallback);

          window.addEventListener(
            "pagehide",
            function () {
              opened = true;
            },
            { once: true }
          );
        }
      }

      function setup() {
        if (!isInAppBrowser()) {
          window.location.replace(targetUrl);
          return;
        }

        var alertEl = document.getElementById("alert");
        var alertText = document.getElementById("alert-text");
        var redirectUrl;

        alertEl.classList.remove("hidden");

        if (isIOS()) {
          alertText.innerHTML = "Open this page in &ldquo;Safari&rdquo;?";
          redirectUrl = buildIOSRedirectUrl(targetUrl);
        } else if (isAndroid()) {
          document.body.classList.add("android");
          alertText.innerHTML = "Open this page in &ldquo;Chrome&rdquo;?";
          redirectUrl = buildAndroidRedirectUrl(targetUrl, true);
        } else {
          redirectUrl = targetUrl;
          alertText.textContent = "Open this page in browser?";
        }

        bindRedirectLinks(redirectUrl);
      }

      setup();

      window.buildRedirectLink = function (url, base) {
        return (base || location.origin + location.pathname) + "#" + encodeTarget(normalizeTarget(url));
      };
    })();
  </script>
</body>
</html>
