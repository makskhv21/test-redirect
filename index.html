<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Continue</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", system-ui, sans-serif;
      background: #fff;
    }

    body.android {
      font-family: Roboto, "Segoe UI", sans-serif;
      background: #fafafa;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
      background: rgba(0, 0, 0, 0.4);
    }

    /* iOS UIAlertController */
    .ios-alert {
      width: 270px;
      max-width: calc(100vw - 32px);
      border-radius: 14px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      box-shadow: 0 0 0 0.5px rgba(0, 0, 0, 0.04);
    }

    @supports not (backdrop-filter: blur(20px)) {
      .ios-alert {
        background: #f2f2f2;
      }
    }

    .ios-alert-body {
      padding: 19px 16px 17px;
      text-align: center;
    }

    .ios-alert-title {
      font-size: 17px;
      font-weight: 600;
      line-height: 22px;
      letter-spacing: -0.43px;
      color: #000;
    }

    .ios-alert-message {
      margin-top: 4px;
      font-size: 13px;
      font-weight: 400;
      line-height: 18px;
      letter-spacing: -0.08px;
      color: #000;
    }

    .ios-alert-actions {
      display: flex;
      border-top: 0.33px solid rgba(60, 60, 67, 0.29);
    }

    .ios-alert-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 11px 8px;
      border: none;
      background: transparent;
      font-family: inherit;
      font-size: 17px;
      line-height: 22px;
      letter-spacing: -0.43px;
      color: #007aff;
      text-decoration: none;
      cursor: pointer;
      user-select: none;
    }

    .ios-alert-btn + .ios-alert-btn {
      border-left: 0.33px solid rgba(60, 60, 67, 0.29);
    }

    .ios-alert-btn:active {
      background: rgba(120, 120, 128, 0.16);
    }

    .ios-alert-btn-cancel {
      font-weight: 400;
    }

    .ios-alert-btn-open {
      font-weight: 600;
    }

    /* Android Material AlertDialog */
    .md-alert {
      width: 312px;
      max-width: calc(100vw - 48px);
      border-radius: 28px;
      overflow: hidden;
      background: #fff;
      box-shadow:
        0 11px 15px rgba(0, 0, 0, 0.08),
        0 9px 46px rgba(0, 0, 0, 0.12);
    }

    .md-alert-body {
      padding: 24px 24px 0;
    }

    .md-alert-title {
      font-size: 24px;
      font-weight: 400;
      line-height: 32px;
      color: #1f1f1f;
    }

    .md-alert-message {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 400;
      line-height: 20px;
      letter-spacing: 0.25px;
      color: #49454f;
    }

    .md-alert-actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      padding: 24px;
    }

    .md-alert-btn {
      min-height: 40px;
      padding: 10px 24px;
      border: none;
      border-radius: 20px;
      background: transparent;
      font-family: inherit;
      font-size: 14px;
      font-weight: 500;
      line-height: 20px;
      letter-spacing: 0.1px;
      color: #1a73e8;
      text-decoration: none;
      cursor: pointer;
    }

    .md-alert-btn:active {
      background: rgba(26, 115, 232, 0.08);
    }

    .md-alert-btn-open {
      background: #1a73e8;
      color: #fff;
    }

    .md-alert-btn-open:active {
      background: #1765cc;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <div id="backdrop" class="backdrop">
    <div id="ios-alert" class="ios-alert hidden" role="alertdialog" aria-modal="true">
      <div class="ios-alert-body">
        <p class="ios-alert-title">Open in Safari?</p>
      </div>
      <div class="ios-alert-actions">
        <button id="ios-cancel" class="ios-alert-btn ios-alert-btn-cancel" type="button">Cancel</button>
        <a id="ios-open" class="ios-alert-btn ios-alert-btn-open" href="#">Open</a>
      </div>
    </div>

    <div id="md-alert" class="md-alert hidden" role="alertdialog" aria-modal="true">
      <div class="md-alert-body">
        <p id="md-title" class="md-alert-title">Open in browser?</p>
        <p id="md-message" class="md-alert-message hidden"></p>
      </div>
      <div class="md-alert-actions">
        <button id="md-cancel" class="md-alert-btn" type="button">Cancel</button>
        <a id="md-open" class="md-alert-btn md-alert-btn-open" href="#">Open</a>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var targetUrl = params.get("to") || params.get("url") || "https://example.com";

      try {
        targetUrl = new URL(targetUrl, window.location.href).href;
      } catch (error) {
        targetUrl = "https://example.com";
      }

      var ua = navigator.userAgent || "";
      var uaLower = ua.toLowerCase();

      var IN_APP_PATTERNS = [
        "tiktok",
        "bytedancewebview",
        "musical_ly",
        "instagram",
        "fban",
        "fbav",
        "fbios",
        "fb_iab",
        "fb4a",
        "twitter",
        "linkedinapp",
        "snapchat",
        "pinterest",
        "reddit",
        "whatsapp",
        "line/",
        "micromessenger",
        "threads",
        "kakaotalk",
        "naver",
        "electron"
      ];

      function isIOS() {
        return /iphone|ipad|ipod/i.test(ua);
      }

      function isAndroid() {
        return /android/i.test(ua);
      }

      function getIOSVersion() {
        var match = ua.match(/OS (\d+)[_.](\d+)/i);
        return match ? parseInt(match[1], 10) : 0;
      }

      function isInAppBrowser() {
        if (IN_APP_PATTERNS.some(function (pattern) {
          return uaLower.indexOf(pattern) !== -1;
        })) {
          return true;
        }

        if (isIOS() && uaLower.indexOf("safari") === -1 && uaLower.indexOf("crios") === -1) {
          return true;
        }

        if (isAndroid() && (/\bwv\b/.test(uaLower) || uaLower.indexOf("version/") !== -1)) {
          return true;
        }

        return false;
      }

      function buildIOSRedirectUrl(url) {
        var iosVersion = getIOSVersion();

        if (iosVersion >= 17) {
          return "x-safari-" + url;
        }

        if (iosVersion >= 15) {
          return "com-apple-mobilesafari-tab:" + url;
        }

        return (
          "shortcuts://x-callback-url/run-shortcut?name=" +
          encodeURIComponent("Open URL") +
          "&x-error=" +
          encodeURIComponent(url)
        );
      }

      function buildAndroidRedirectUrl(url, useChrome) {
        var stripped = url.replace(/^https?:\/\//, "");
        var intent =
          "intent://" +
          stripped +
          "#Intent;scheme=https;action=android.intent.action.VIEW;";

        if (useChrome) {
          intent += "package=com.android.chrome;";
        }

        intent += "S.browser_fallback_url=" + encodeURIComponent(url) + ";end";
        return intent;
      }

      function setupAndroidFallback(btn) {
        btn.addEventListener("click", function () {
          var opened = false;

          setTimeout(function () {
            if (!opened && document.visibilityState === "visible") {
              btn.href = buildAndroidRedirectUrl(targetUrl, false);
            }
          }, 1200);

          window.addEventListener(
            "pagehide",
            function () {
              opened = true;
            },
            { once: true }
          );
        });
      }

      function setup() {
        if (!isInAppBrowser()) {
          window.location.replace(targetUrl);
          return;
        }

        var backdrop = document.getElementById("backdrop");

        if (isIOS()) {
          var iosAlert = document.getElementById("ios-alert");
          var iosOpen = document.getElementById("ios-open");
          var iosCancel = document.getElementById("ios-cancel");

          iosAlert.classList.remove("hidden");
          iosOpen.href = buildIOSRedirectUrl(targetUrl);

          iosCancel.addEventListener("click", function () {
            backdrop.classList.add("hidden");
          });
        } else if (isAndroid()) {
          document.body.classList.add("android");

          var mdAlert = document.getElementById("md-alert");
          var mdOpen = document.getElementById("md-open");
          var mdCancel = document.getElementById("md-cancel");

          mdAlert.classList.remove("hidden");
          mdOpen.href = buildAndroidRedirectUrl(targetUrl, true);
          setupAndroidFallback(mdOpen);

          mdCancel.addEventListener("click", function () {
            backdrop.classList.add("hidden");
          });
        } else {
          window.location.replace(targetUrl);
        }
      }

      setup();
    })();
  </script>
</body>
</html>
