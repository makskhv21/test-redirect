<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <title>Continue</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      background: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #111;
      overflow: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      padding: 24px;
      text-align: center;
    }

    .safari-icon {
      width: 72px;
      height: 72px;
      margin-bottom: 20px;
    }

    .hint {
      font-size: 15px;
      line-height: 1.4;
      color: #666;
      max-width: 280px;
    }

    .tap-zone {
      position: fixed;
      inset: 0;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <div id="tap-zone" class="tap-zone" aria-label="Continue"></div>

  <main id="screen" class="screen">
    <svg class="safari-icon" viewBox="0 0 72 72" aria-hidden="true">
      <circle cx="36" cy="36" r="34" fill="#007AFF"/>
      <circle cx="36" cy="36" r="28" fill="#fff"/>
      <polygon points="36,14 42,36 36,58 30,36" fill="#FF3B30"/>
      <polygon points="14,36 36,30 58,36 36,42" fill="#34C759"/>
      <circle cx="36" cy="36" r="4" fill="#007AFF"/>
    </svg>
    <p id="hint" class="hint">Tap to continue</p>
  </main>

  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var targetUrl = params.get("to") || params.get("url") || "https://example.com";

      try {
        targetUrl = new URL(targetUrl, window.location.href).href;
      } catch (error) {
        targetUrl = "https://example.com";
      }

      var ua = navigator.userAgent || "";
      var uaLower = ua.toLowerCase();

      function isIOS() {
        return /iphone|ipad|ipod/i.test(ua);
      }

      function isAndroid() {
        return /android/i.test(ua);
      }

      function getIOSVersion() {
        var match = ua.match(/OS (\d+)[_.](\d+)/i);
        return match ? parseInt(match[1], 10) : 0;
      }

      function isInAppBrowser() {
        var patterns = [
          "tiktok",
          "bytedancewebview",
          "musical_ly",
          "instagram",
          "fban",
          "fbav",
          "fbios",
          "fb_iab",
          "fb4a",
          "twitter",
          "linkedinapp",
          "snapchat",
          "pinterest",
          "reddit",
          "whatsapp",
          "line/",
          "micromessenger"
        ];

        return patterns.some(function (pattern) {
          return uaLower.indexOf(pattern) !== -1;
        });
      }

      function buildIOSRedirectUrl(url) {
        var iosVersion = getIOSVersion();

        if (iosVersion >= 17) {
          return "x-safari-" + url;
        }

        if (iosVersion > 0) {
          return "com-apple-mobilesafari-tab:" + url;
        }

        return (
          "shortcuts://x-callback-url/run-shortcut?name=" +
          crypto.randomUUID() +
          "&x-error=" +
          encodeURIComponent(url)
        );
      }

      function buildAndroidRedirectUrl(url) {
        var stripped = url.replace(/^https?:\/\//, "");
        return (
          "intent://" +
          stripped +
          "#Intent;scheme=https;S.browser_fallback_url=" +
          encodeURIComponent(url) +
          ";end"
        );
      }

      function openInSystemBrowser() {
        if (isIOS()) {
          window.location.href = buildIOSRedirectUrl(targetUrl);
          return;
        }

        if (isAndroid()) {
          window.location.href = buildAndroidRedirectUrl(targetUrl);
          return;
        }

        window.location.replace(targetUrl);
      }

      function setup() {
        var tapZone = document.getElementById("tap-zone");
        var hint = document.getElementById("hint");

        if (!isInAppBrowser()) {
          window.location.replace(targetUrl);
          return;
        }

        if (isIOS()) {
          hint.textContent = "Tap to open in Safari";
        } else if (isAndroid()) {
          hint.textContent = "Tap to open in browser";
        } else {
          hint.textContent = "Tap to continue";
        }

        var opened = false;

        function handleTap(event) {
          if (opened) {
            return;
          }

          opened = true;
          event.preventDefault();
          openInSystemBrowser();
        }

        tapZone.addEventListener("click", handleTap, { passive: false });
        tapZone.addEventListener("touchend", handleTap, { passive: false });
      }

      setup();
    })();
  </script>
</body>
</html>
