<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="robots" content="noindex, nofollow" />
    <title>Continue</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        -webkit-tap-highlight-color: transparent;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display",
          system-ui, sans-serif;
        background: #fff;
      }

      body.android {
        font-family: Roboto, "Segoe UI", sans-serif;
      }

      .backdrop {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
        background: rgba(0, 0, 0, 0.35);
      }

      .alert {
        width: min(100%, 360px);
        padding: 18px 20px 14px;
        border-radius: 14px;
        background: rgba(242, 242, 247, 0.88);
        backdrop-filter: saturate(180%) blur(20px);
        -webkit-backdrop-filter: saturate(180%) blur(20px);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.12),
          0 0 0 0.5px rgba(0, 0, 0, 0.06);
      }

      @supports not (backdrop-filter: blur(20px)) {
        .alert {
          background: #ebebef;
        }
      }

      .alert-text {
        font-size: 17px;
        font-weight: 400;
        line-height: 22px;
        letter-spacing: -0.43px;
        color: #000;
        text-align: left;
        padding-right: 8px;
      }

      .alert-actions {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 20px;
        margin-top: 18px;
      }

      .alert-btn {
        border: none;
        background: transparent;
        font-family: inherit;
        font-size: 17px;
        line-height: 22px;
        letter-spacing: -0.43px;
        color: #007aff;
        text-decoration: none;
        cursor: pointer;
        user-select: none;
        padding: 2px 0;
      }

      .alert-btn:active {
        opacity: 0.55;
      }

      .alert-btn-cancel {
        font-weight: 400;
      }

      .alert-btn-open {
        font-weight: 600;
      }

      body.android .alert-btn {
        color: #1a73e8;
        font-size: 14px;
        letter-spacing: 0.1px;
      }

      body.android .alert-text {
        font-size: 16px;
        line-height: 24px;
        letter-spacing: 0.15px;
      }

      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div id="backdrop" class="backdrop">
      <div id="alert" class="alert hidden" role="alertdialog" aria-modal="true">
        <p id="alert-text" class="alert-text">
          Open this page in &ldquo;Safari&rdquo;?
        </p>
        <div class="alert-actions">
          <a id="btn-cancel" class="alert-btn alert-btn-cancel" href="#"
            >Cancel</a
          >
          <a id="btn-open" class="alert-btn alert-btn-open" href="#">Open</a>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var TARGET_URL = "https://github.com";

        var ua = navigator.userAgent || "";
        var uaLower = ua.toLowerCase();

        var IN_APP_APPS = [
          {
            id: "tiktok",
            patterns: ["tiktok", "bytedancewebview", "musical_ly"],
          },
          { id: "instagram", patterns: ["instagram"] },
          { id: "threads", patterns: ["barcelona", "threads"] },
          {
            id: "facebook",
            patterns: ["fban", "fbav", "fbios", "fb_iab", "fb4a", "facebook"],
          },
          { id: "messenger", patterns: ["messenger", "messengerlite"] },
          { id: "twitter", patterns: ["twitter", "x.com"] },
          { id: "linkedin", patterns: ["linkedinapp"] },
          { id: "snapchat", patterns: ["snapchat"] },
          { id: "pinterest", patterns: ["pinterest"] },
          { id: "reddit", patterns: ["reddit"] },
          { id: "whatsapp", patterns: ["whatsapp"] },
          { id: "line", patterns: ["line/"] },
          { id: "wechat", patterns: ["micromessenger"] },
          { id: "kakao", patterns: ["kakaotalk"] },
          { id: "telegram", patterns: ["telegram"] },
          { id: "naver", patterns: ["naver"] },
        ];

        function isIOS() {
          return (
            /iphone|ipad|ipod/i.test(ua) ||
            (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1)
          );
        }

        function isAndroid() {
          return /android/i.test(ua);
        }

        function getIOSVersion() {
          var match = ua.match(/OS (\d+)[_.](\d+)/i);
          return match ? parseInt(match[1], 10) : 0;
        }

        function isInAppBrowser() {
          for (var i = 0; i < IN_APP_APPS.length; i++) {
            var app = IN_APP_APPS[i];
            for (var j = 0; j < app.patterns.length; j++) {
              if (uaLower.indexOf(app.patterns[j]) !== -1) {
                return true;
              }
            }
          }

          if (
            isIOS() &&
            uaLower.indexOf("safari") === -1 &&
            uaLower.indexOf("crios") === -1
          ) {
            return true;
          }

          if (
            isAndroid() &&
            (/\bwv\b/.test(uaLower) || uaLower.indexOf("version/") !== -1)
          ) {
            return true;
          }

          return false;
        }

        function isSafariBrowser() {
          return (
            isIOS() &&
            /safari/i.test(ua) &&
            !/crios|fxios|edgios|opios/i.test(ua) &&
            !isInAppBrowser()
          );
        }

        function isChromeBrowser() {
          return (
            isAndroid() &&
            /chrome/i.test(ua) &&
            !/edg|opr|samsungbrowser|firefox/i.test(ua) &&
            !isInAppBrowser()
          );
        }

        function buildSafariUrl(url) {
          var iosVersion = getIOSVersion();

          if (iosVersion >= 17) {
            return "x-safari-" + url;
          }

          if (iosVersion >= 15) {
            return "com-apple-mobilesafari-tab:" + url;
          }

          return (
            "shortcuts://x-callback-url/run-shortcut?name=" +
            encodeURIComponent("Open URL") +
            "&x-error=" +
            encodeURIComponent(url)
          );
        }

        function buildChromeUrl(url) {
          var stripped = url.replace(/^https?:\/\//, "");
          return (
            "intent://" +
            stripped +
            "#Intent;scheme=https;action=android.intent.action.VIEW;" +
            "package=com.android.chrome;" +
            "S.browser_fallback_url=" +
            encodeURIComponent(url) +
            ";end"
          );
        }

        function buildChromeFallbackUrl(url) {
          return "googlechrome://navigate?url=" + encodeURIComponent(url);
        }

        function bindOpenButton(openUrl, fallbackUrl) {
          var btnOpen = document.getElementById("btn-open");
          var btnCancel = document.getElementById("btn-cancel");
          var escaped = false;

          btnOpen.href = openUrl;
          btnCancel.addEventListener("click", function (event) {
            event.preventDefault();
          });

          function markEscaped() {
            escaped = true;
          }

          window.addEventListener("pagehide", markEscaped, { once: true });
          document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") {
              markEscaped();
            }
          });

          if (fallbackUrl) {
            btnOpen.addEventListener("click", function () {
              setTimeout(function () {
                if (!escaped && document.visibilityState === "visible") {
                  btnOpen.href = fallbackUrl;
                }
              }, 1200);
            });
          }
        }

        function showEscapeDialog(openUrl, fallbackUrl, browserLabel) {
          var alertEl = document.getElementById("alert");
          var alertText = document.getElementById("alert-text");

          if (isAndroid()) {
            document.body.classList.add("android");
          }

          alertText.innerHTML =
            "Open this page in &ldquo;" + browserLabel + "&rdquo;?";
          alertEl.classList.remove("hidden");
          bindOpenButton(openUrl, fallbackUrl);
        }

        function setup() {
          var targetUrl = TARGET_URL;

          if (isIOS()) {
            if (isSafariBrowser()) {
              window.location.replace(targetUrl);
              return;
            }

            showEscapeDialog(buildSafariUrl(targetUrl), null, "Safari");
            return;
          }

          if (isAndroid()) {
            if (isChromeBrowser()) {
              window.location.replace(targetUrl);
              return;
            }

            showEscapeDialog(
              buildChromeUrl(targetUrl),
              buildChromeFallbackUrl(targetUrl),
              "Chrome",
            );
            return;
          }

          window.location.replace(targetUrl);
        }

        setup();
      })();
    </script>
  </body>
</html>
